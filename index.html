<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

  <section class="hero" id="hero">

    <!-- Imágenes alrededor de la frase -->
    <div class="float-img img-1"></div>
    <div class="float-img img-2"></div>
    <div class="float-img img-3"></div>
    <div class="float-img img-4"></div>
    <div class="float-img img-5"></div>
    <div class="float-img img-6"></div>

    <!-- Frase central: logo tipográfico 3D -->
    <div class="text3d-wrap" id="text3dWrap">
      <div class="text3d" id="text3d">
        <!-- las capas de profundidad se generan en index.js -->
      </div>
    </div>

    <!-- Área real de detección del cursor sobre el texto (se dimensiona
         por JS según el tamaño renderizado de la palabra) -->
    <div class="text-hit" id="textHit"></div>

    <!-- Imagen que sigue al cursor al pasar sobre el texto -->
    <div class="cursor-img" id="cursorImg"></div>

  </section>

  <!-- defer asegura que el HTML está completo antes de ejecutar el JS,
       así getElementById nunca devuelve null -->
  <script src="index.js" defer></script>
</body>
</html>
