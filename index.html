<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Filtro SVG para el efecto de "grano" sobre el texto -->
  <svg width="0" height="0" style="position:absolute;">
    <filter id="grainFilter">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="5"/>
      <feDisplacementMap id="dispMap" in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <section class="hero">

    <!-- Imágenes flotantes alrededor -->
    <div class="float-img img-1"></div>
    <div class="float-img img-2"></div>
    <div class="float-img img-3"></div>
    <div class="float-img img-4"></div>
    <div class="float-img img-5"></div>
    <div class="float-img img-6"></div>

    <!-- Frase central -->
    <h1 class="main-text" id="mainText">FRASE</h1>

  </section>

  <script src="script.js"></script>
</body>
</html>
