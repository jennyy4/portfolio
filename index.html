<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Filtro SVG para el efecto de grano/difuminado del texto -->
  <svg width="0" height="0" style="position:absolute;">
    <filter id="grainFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.012" numOctaves="2" result="noise" seed="3"/>
      <feDisplacementMap id="dispMap" in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" result="warped"/>
      <feGaussianBlur in="warped" stdDeviation="0" result="blurred"/>
    </filter>
  </svg>

  <section class="hero" id="hero">

    <!-- Imágenes alrededor de la frase -->
    <div class="float-img img-1"></div>
    <div class="float-img img-2"></div>
    <div class="float-img img-3"></div>
    <div class="float-img img-4"></div>
    <div class="float-img img-5"></div>
    <div class="float-img img-6"></div>

    <!-- Frase central -->
    <div class="text-wrap" id="textWrap">
      <h1 class="main-text" id="mainText">FRASE</h1>
    </div>

  </section>

  <script src="index.js"></script>
</body>
</html>
